---
# k8s/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: mlops
  labels:
    name: mlops
---
# k8s/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlops-config
  namespace: mlops
data:
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  PYTHONPATH: "/app"
  LOG_LEVEL: "INFO"
  MAX_WORKERS: "4"
---
# k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: mlops-secrets
  namespace: mlops
type: Opaque
stringData:
  ADMIN_PASSWORD: "change-me-in-production"  # Change this!
  JWT_SECRET: "your-secret-jwt-key-here"    # Change this!
  MLFLOW_S3_BUCKET: "mlops-artifacts"        # Optional: for S3 storage
---
# k8s/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-data
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-models
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-mlflow
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
