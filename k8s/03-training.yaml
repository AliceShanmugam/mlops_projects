---
# k8s/training-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training
  namespace: mlops
  labels:
    app: training
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training
  template:
    metadata:
      labels:
        app: training
    spec:
      serviceAccountName: mlops-training
      containers:
      - name: training
        image: ghcr.io/your-org/training:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: mlops-config
              key: MLFLOW_TRACKING_URI
        - name: PYTHONPATH
          valueFrom:
            configMapKeyRef:
              name: mlops-config
              key: PYTHONPATH
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: mlops-config
              key: LOG_LEVEL
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: models
          mountPath: /app/models
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
      - name: models
        persistentVolumeClaim:
          claimName: mlops-models
---
# k8s/training-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: training
  namespace: mlops
  labels:
    app: training
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: training
---
# k8s/training-rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlops-training
  namespace: mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mlops-training
  namespace: mlops
rules:
- apiGroups: [""]
  resources: ["pods", "pods/logs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mlops-training
  namespace: mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mlops-training
subjects:
- kind: ServiceAccount
  name: mlops-training
  namespace: mlops
