services:

  gateway:
    build: services/gateway
    ports:
      - "8000:8000"
    depends_on:
      - inference
      - training

  training:
    build: services/training
    ports:
      - "8001:8000"
    volumes:
      - ./data:/data
      - ./models:/models
    depends_on:
      - mlflow

  inference:
    build: services/inference
    ports:
      - "8002:8000"
    volumes:
      - ./models:/models

  mlflow:
    image: python:3.12-slim
    container_name: mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --serve-artifacts
      --allowed-hosts mlflow,localhost,127.0.0.1
      --cors-allowed-origins *
    volumes:
      - ./mlflow:/mlflow
    ports:
      - "5000:5000"

