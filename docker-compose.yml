services:

  gateway:
    build: services/gateway
    ports:
      - "8000:8000"
    depends_on:
      - inference
      - training

  training:
    build: services/training
    ports:
      - "8001:8000"
    volumes:
      - ./data:/data
      - ./models:/models
    depends_on:
      - mlflow

  inference:
    build: services/inference
    ports:
      - "8002:8000"
    volumes:
      - ./models:/models

  mlflow:
    
    build: mlflow
    
    volumes:
      - ./mlflow:/mlflow
    ports:
      - "5000:5000"

