---
# monitoring/grafana-datasource.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mlops
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true
---
# monitoring/grafana-dashboard.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: mlops
data:
  mlops-dashboard.json: |
    {
      "dashboard": {
        "title": "MLOps Monitoring",
        "tags": ["mlops", "production"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Request Rate",
            "targets": [
              {
                "expr": "rate(mlops_requests_total[5m])",
                "legendFormat": "{{endpoint}}"
              }
            ]
          },
          {
            "title": "Request Latency (p95)",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, mlops_request_duration_seconds)",
                "legendFormat": "{{endpoint}}"
              }
            ]
          },
          {
            "title": "Model Prediction Latency",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, mlops_model_prediction_duration_seconds)",
                "legendFormat": "{{model_type}}"
              }
            ]
          },
          {
            "title": "Error Rate",
            "targets": [
              {
                "expr": "rate(mlops_errors_total[5m])",
                "legendFormat": "{{error_type}}"
              }
            ]
          },
          {
            "title": "Data Drift Score",
            "targets": [
              {
                "expr": "mlops_data_drift_score",
                "legendFormat": "{{feature}}"
              }
            ]
          }
        ]
      }
    }
---
# monitoring/grafana-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"  # Change in production!
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: grafana-storage
        emptyDir: {}
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards
---
# monitoring/grafana-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mlops
spec:
  type: LoadBalancer
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: grafana
