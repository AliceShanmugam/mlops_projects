
name: CI - MLOps Pipeline

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # PYTHON SETUP
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt

      # =========================
      # LINT (qualité code)
      # =========================
      - name: Run flake8
        run: |
          pip install flake8
          flake8 src --max-line-length=120

      # =========================
      # UNIT TESTS
      # =========================
      - name: Run tests
        run: |
          pytest tests --disable-warnings -q

  # =========================
  # BUILD DOCKER (OPTIONNEL MAIS RECOMMANDÉ)
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Gateway image
        run: docker build -t gateway -f gateway/Dockerfile .

      - name: Build Inference image
        run: docker build -t inference -f src/inference/Dockerfile .

      - name: Build Auth image
        run: docker build -t auth -f src/gateway/Dockerfile .

      - name: Build Training image
        run: docker build -t training -f src/training/Dockerfile .