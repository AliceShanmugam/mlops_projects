name: CI - MLOps Pipeline

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:

  # ======================================================
  # TEST PAR SERVICE
  # ======================================================
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [gateway, inference, training]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r src/${{ matrix.service }}/requirements.txt

      - name: Run flake8
        run: |
          pip install flake8
          flake8 src/${{ matrix.service }} --max-line-length=120

      - name: Run tests
        run: |
          pytest tests/${{ matrix.service }} --disable-warnings -q


  # ======================================================
  # AIRFLOW
  # ======================================================
  airflow:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Airflow deps
        run: |
          pip install -r airflow/requirements.txt

      - name: Validate DAGs
        run: |
          python -m py_compile airflow/dags/*.py


  # ======================================================
  # BUILD + PUSH DOCKER
  # ======================================================
  docker:
    runs-on: ubuntu-latest
    needs: [test, airflow]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 LOGIN DOCKER HUB
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # =========================
      # BUILD IMAGES
      # =========================
      - name: Build Gateway
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gateway:latest -f gateway/Dockerfile .

      - name: Build Auth
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth:latest -f src/gateway/Dockerfile .

      - name: Build Inference
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/inference:latest -f src/inference/Dockerfile .

      - name: Build Training
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/training:latest -f src/training/Dockerfile .

      # =========================
      # PUSH IMAGES
      # =========================
      - name: Push Gateway
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gateway:latest

      - name: Push Auth
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth:latest

      - name: Push Inference
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/inference:latest

      - name: Push Training
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/training:latest