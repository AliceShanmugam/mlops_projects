name: Shell commands
on:
  pull_request:
    types: [closed, assigned, opened, reopened]
  push:
    branches:
      - develop
      - main

jobs:
  run-shell-command:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-20.04]
    steps:
      - name: echo a string
        run: echo "Hello world"
      - name: multiline script
        run: |
          python3 -V
          ls -l