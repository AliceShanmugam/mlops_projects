services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports: 
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0

  preprocessing:
    build:
      context: .
      dockerfile: src/preprocessing/Dockerfile
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  training:
    build:
      context: . # Utilise le Dockerfile dans le dossier courant
      dockerfile : src/training/Dockerfile
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
      - preprocessing

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models