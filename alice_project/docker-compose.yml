networks:
  alice_network:
    driver: bridge
    name: alice_network

volumes:
  airflow_db:
  postgres_db:
  minio_data:

services:
  # ================================================================
  # MinIO - Object Storage (S3-compatible)
  # ================================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # API S3
      - "9001:9001"    # Console Web UI
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - alice_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Service one-shot pour créer les buckets au démarrage
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/raw-data;
      mc mb --ignore-existing local/processed-data;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - alice_network

  # ========================================================================
  # POSTGRESQL Database for Airflow
  # ========================================================================
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db:/var/lib/postgresql/data
    networks:
      - alice_network
    restart: unless-stopped

  # ========================================================================
  # Airflow Web UI (no scheduler - manual trigger only)
  # ========================================================================
  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: airflow-webserver
    group_add:
      - "108"  # Add to root group to access Docker socket
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      PROJECT_ROOT: ${PROJECT_ROOT}
      DAGSHUB_USER_TOKEN: ${DAGSHUB_USER_TOKEN}
      DAGSHUB_USERNAME: ${DAGSHUB_USERNAME}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CHALLENGEDATA_USERNAME: ${CHALLENGEDATA_USERNAME}
      CHALLENGEDATA_PASSWORD: ${CHALLENGEDATA_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/opt/airflow/config
      - ./src:/opt/airflow/src
    ports:
      - "8081:8080"
    command: standalone
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - postgres
      - minio

  # ========================================================================
  # Preprocessing Service
  # ========================================================================
  preprocessing:
    build:
      context: .
      dockerfile: src/preprocessing/Dockerfile
    image: alice_project-preprocessing:latest
    container_name: preprocessing
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    networks:
      - alice_network
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy

  # ========================================================================
  # Training Service
  # ========================================================================
  training:
    build:
      context: .
      dockerfile: src/training/Dockerfile
    image: alice_project-training:latest
    container_name: training
    volumes:
      - ./logs:/app/logs
    environment:
      - MLFLOW_TRACKING_URI=https://dagshub.com/AliceShanmugam/mlops_projects.mlflow
      - MLFLOW_TRACKING_USERNAME=${DAGSHUB_USERNAME}
      - MLFLOW_TRACKING_PASSWORD=${DAGSHUB_USER_TOKEN}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
    networks:
      - alice_network
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy

  # ========================================================================
  # Prediction API
  # ========================================================================
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    image: alice_project-api:latest
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - AIRFLOW_WEBSERVER_URL=http://airflow-webserver:8080
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - airflow

  # ========================================================================
  # Gateway
  # ========================================================================
  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    image: alice_project-gateway:latest
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - API_SERVICE_URL=http://api:8000
      - AIRFLOW_URL=http://airflow-webserver:8080
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - api
      - airflow