networks:
  alice_network:
    driver: bridge
    name: alice_network

volumes:
  airflow_db:
  postgres_db:

services:
  # ========================================================================
  # MLFlow Tracking Server
  # ========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --artifacts-destination /mlruns
      --host 0.0.0.0
    networks:
      - alice_network
    restart: unless-stopped

  # ========================================================================
  # POSTGRESQL Database for Airflow
  # ========================================================================
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db:/var/lib/postgresql/data
    networks:
      - alice_network
    restart: unless-stopped

  # ========================================================================
  # Airflow Web UI (no scheduler - manual trigger only)
  # ========================================================================
  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: airflow-webserver
    group_add:
      - "108"  # Add to root group to access Docker socket
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/opt/airflow/config
      - ./src:/opt/airflow/src
    ports:
      - "8081:8080"
    command: standalone
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - mlflow
      - postgres

  # ========================================================================
  # Preprocessing Service
  # ========================================================================
  preprocessing:
    build:
      context: .
      dockerfile: src/preprocessing/Dockerfile
    image: alice_project-preprocessing:latest
    container_name: preprocessing
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
    networks:
      - alice_network
    restart: "no"

  # ========================================================================
  # Training Service
  # ========================================================================
  training:
    build:
      context: .
      dockerfile: src/training/Dockerfile
    image: alice_project-training:latest
    container_name: training
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
    networks:
      - alice_network
    restart: "no"
    depends_on:
      - mlflow

  # ========================================================================
  # Prediction API
  # ========================================================================
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    image: alice_project-api:latest
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - AIRFLOW_WEBSERVER_URL=http://airflow-webserver:8080
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - airflow

  # ========================================================================
  # Gateway (Optional - routes to API and Airflow)
  # ========================================================================
  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    image: alice_project-gateway:latest
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - API_SERVICE_URL=http://api:8000
      - AIRFLOW_URL=http://airflow-webserver:8080
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - api
      - airflow