services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports: 
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --artifacts-destination /mlruns
      --host 0.0.0.0
      --allowed-hosts '*'
#     --allowed-hosts mlflow,localhost,127.0.0.1,localhost:5000

  preprocessing:
    build:
      context: .
      dockerfile: src/preprocessing/Dockerfile
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  training:
    build:
      context: . # Utilise le Dockerfile dans le dossier courant
      dockerfile : src/training/Dockerfile
    image : alice_project-training
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
        mlflow:
          condition: service_started
        preprocessing:
          condition: service_started
    ports :
      - "8001:8001"

  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: airflow
    restart: always
    environment:
      # Utilisation du SequentialExecutor pour SQLite
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"  # UI Airflow
    command: >
      bash -c "airflow db init && airflow webserver"

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    depends_on:
        api:
          condition: service_started
        training:
          condition: service_started
    ports:
      - "8080:8080"