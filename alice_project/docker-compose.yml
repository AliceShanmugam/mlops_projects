networks:
  alice_network:
    driver: bridge
    name: alice_network

volumes:
  postgres_db:

services:
  # ========================================================================
  # POSTGRESQL Database for Airflow
  # ========================================================================
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db:/var/lib/postgresql/data
    networks:
      - alice_network
    restart: unless-stopped

  # ========================================================================
  # Airflow
  # ========================================================================
  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: airflow-webserver
    group_add:
      - "108"  # Add to root group to access Docker socket
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      PROJECT_ROOT: ${PROJECT_ROOT}
      DAGSHUB_USER_TOKEN: ${DAGSHUB_USER_TOKEN}
      DAGSHUB_USERNAME: ${DAGSHUB_USERNAME}
      CHALLENGEDATA_USERNAME: ${CHALLENGEDATA_USERNAME}
      CHALLENGEDATA_PASSWORD: ${CHALLENGEDATA_PASSWORD}
      # Clé admin pour que registry_task puisse appeler /models/reload
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      API_SERVICE_URL: http://api:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/opt/airflow/config
      - ./src:/opt/airflow/src
    ports:
      - "8081:8080"
    command: standalone
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - postgres

  # ========================================================================
  # Preprocessing — image build target (exécuté via DockerOperator Airflow)
  # ========================================================================
  preprocessing:
    build:
      context: .
      dockerfile: src/preprocessing/Dockerfile
    image: alice_project-preprocessing:latest
    container_name: preprocessing
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.dvc:/app/.dvc
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - DATA_RAW_DIR=/app/data/raw
      - DATA_PROCESSED_DIR=/app/data/processed
      - DAGSHUB_USERNAME=${DAGSHUB_USERNAME}
      - DAGSHUB_USER_TOKEN=${DAGSHUB_USER_TOKEN}
    networks:
      - alice_network
    restart: "no"

  # ========================================================================
  # Training Service — image build target (exécuté via DockerOperator Airflow)
  # ========================================================================
  training:
    build:
      context: .
      dockerfile: src/training/Dockerfile
    image: alice_project-training:latest
    container_name: training
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
      - ./.dvc:/app/.dvc
    environment:
      - MLFLOW_TRACKING_URI=https://dagshub.com/AliceShanmugam/mlops_projects.mlflow
      - MLFLOW_TRACKING_USERNAME=${DAGSHUB_USERNAME}
      - MLFLOW_TRACKING_PASSWORD=${DAGSHUB_USER_TOKEN}
      - DATA_PROCESSED_DIR=/app/data/processed
      - MODELS_PATH=/app/models
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
    networks:
      - alice_network
    restart: "no"

  # ========================================================================
  # Prediction API
  # ========================================================================
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    image: alice_project-api:latest
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models        # lit les modèles écrits par training
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - MODELS_PATH=/app/models
      - AIRFLOW_WEBSERVER_URL=http://airflow-webserver:8080
      - API_KEY=${API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - MLFLOW_TRACKING_USERNAME=${DAGSHUB_USERNAME}
      - MLFLOW_TRACKING_PASSWORD=${DAGSHUB_USER_TOKEN}
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - airflow

  # ========================================================================
  # Gateway
  # ========================================================================
  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    image: alice_project-gateway:latest
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - API_SERVICE_URL=http://api:8000
      - AIRFLOW_URL=http://airflow-webserver:8080
      - API_KEY=${API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    networks:
      - alice_network
    restart: unless-stopped
    depends_on:
      - api
      - airflow