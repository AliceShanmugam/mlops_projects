version : '3.9'

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports: 
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --artifacts-destination /mlruns
      --host 0.0.0.0
      --allowed-hosts '*'
#     --allowed-hosts mlflow,localhost,127.0.0.1,localhost:5000

  preprocessing:
    build:
      context: .
      dockerfile: src/preprocessing/Dockerfile
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  training:
    build:
      context: . # Utilise le Dockerfile dans le dossier courant
      dockerfile : src/training/Dockerfile
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
        mlflow:
          condition: service_started
        preprocessing:
          condition: service_started
    ports :
      - "8001:8001"

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    depends_on:
        api:
          condition: service_started
        training:
          condition: service_started
    ports:
      - "8080:8080"