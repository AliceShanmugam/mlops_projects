name: CI — Tests · Build · Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # JOB 1 : Tests unitaires
  # ============================================================
  tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy French model
        run: python -m spacy download fr_core_news_sm

      - name: Run tests
        env:
          # Variables minimales pour les tests
          API_KEY: test-key
          ADMIN_API_KEY: test-admin-key
          MODELS_PATH: models
          DATA_RAW_DIR: data/raw
          DATA_PROCESSED_DIR: data/processed
          MLFLOW_TRACKING_URI: ""            # désactivé en test
          AIRFLOW_WEBSERVER_URL: http://localhost:8080
        run: pytest tests/ -v --tb=short

  # ============================================================
  # JOB 2 : Build & Push Docker images
  # Déclenché uniquement sur push main (pas sur PR)
  # ============================================================
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: tests                             # ne tourne que si les tests passent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=$(date +%Y%m%d)-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push preprocessing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/preprocessing/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-preprocessing:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-preprocessing:${{ steps.tag.outputs.TAG }}

      - name: Build & push training
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/training/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-training:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-training:${{ steps.tag.outputs.TAG }}

      - name: Build & push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/api/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-api:${{ steps.tag.outputs.TAG }}

      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/alice_project-gateway:${{ steps.tag.outputs.TAG }}